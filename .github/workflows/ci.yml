name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
