name: Bug report
description: Report a reproducible Aerial problem
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the command you ran and the output you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aerial version
      placeholder: aerial --version
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, shell, install method, relevant agent setup
